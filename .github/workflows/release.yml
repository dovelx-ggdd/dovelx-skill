name: 自动发版

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: 创建 GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 从 tag 提取版本号
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "发版版本: $VERSION"

      - name: 校验版本号一致性
        run: |
          CLAUDE_VER=$(jq -r '.version' .claude-plugin/plugin.json)
          CURSOR_VER=$(jq -r '.version' .cursor-plugin/plugin.json)
          TAG_VER="${{ steps.version.outputs.version }}"

          if [ "$CLAUDE_VER" != "$TAG_VER" ]; then
            echo "ERROR: tag 版本 ($TAG_VER) 与 .claude-plugin/plugin.json ($CLAUDE_VER) 不一致"
            exit 1
          fi
          if [ "$CURSOR_VER" != "$TAG_VER" ]; then
            echo "ERROR: tag 版本 ($TAG_VER) 与 .cursor-plugin/plugin.json ($CURSOR_VER) 不一致"
            exit 1
          fi
          echo "版本校验通过: $TAG_VER"

      - name: 从 CHANGELOG.md 提取发版说明
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # 提取对应版本的 CHANGELOG 内容
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="请查看 [CHANGELOG.md](CHANGELOG.md) 了解详细变更。"
          fi

          # 写入多行内容到环境变量
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "dovelx-skill ${{ steps.version.outputs.tag }}"
          body: |
            ## dovelx-skill ${{ steps.version.outputs.tag }}

            ${{ steps.changelog.outputs.notes }}

            ---

            ### 安装 / 更新（Claude Code）

            ```
            /plugin marketplace add DoveXiaZi/dovelx-skill
            /plugin install dovelx@dovelx-skill
            ```

            ### Cursor

            **推荐：** 按仓库 [`README.md`](README.md) 将本仓库放入 **`~/.cursor/plugins/local`**（可用符号链接），重启或 Reload Window。  
            **可选：** [Cursor Marketplace](https://cursor.com/marketplace) 上架后搜索 **dovelx**，或通过 [提交插件](https://cursor.com/marketplace/publish) 提交仓库 URL。

            完整变更记录见 [CHANGELOG.md](CHANGELOG.md)
          draft: false
          prerelease: false

name: 验证技能格式

on:
  push:
    branches: [ main ]
    paths:
      - 'skills/**'
      - '.claude-plugin/**'
      - '.cursor-plugin/**'
      - 'scripts/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'skills/**'
      - '.claude-plugin/**'
      - '.cursor-plugin/**'
      - 'scripts/**'

jobs:
  validate-skills:
    name: 验证技能 SKILL.md 格式
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 赋予脚本执行权限
        run: chmod +x scripts/validate-skills.sh

      - name: 执行格式验证
        run: bash scripts/validate-skills.sh

  validate-plugin-json:
    name: 验证 Claude / Cursor plugin.json
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 校验 Claude plugin.json
        run: |
          echo "检查 .claude-plugin/plugin.json 必填字段..."
          for field in name description version author skills; do
            if ! jq -e ".$field" .claude-plugin/plugin.json > /dev/null 2>&1; then
              echo "ERROR: .claude-plugin/plugin.json 缺少字段: $field"
              exit 1
            fi
          done
          echo ".claude-plugin/plugin.json 验证通过"

      - name: 校验 Claude marketplace.json
        run: |
          echo "检查 .claude-plugin/marketplace.json 必填字段..."
          for field in name owner metadata plugins; do
            if ! jq -e ".$field" .claude-plugin/marketplace.json > /dev/null 2>&1; then
              echo "ERROR: .claude-plugin/marketplace.json 缺少字段: $field"
              exit 1
            fi
          done
          echo ".claude-plugin/marketplace.json 验证通过"

      - name: 校验 Cursor plugin.json
        run: |
          echo "检查 .cursor-plugin/plugin.json 必填字段..."
          for field in name description version author skills agents; do
            if ! jq -e ".$field" .cursor-plugin/plugin.json > /dev/null 2>&1; then
              echo "ERROR: .cursor-plugin/plugin.json 缺少字段: $field"
              exit 1
            fi
          done
          agents_len=$(jq '.agents | length' .cursor-plugin/plugin.json)
          if [ "$agents_len" -eq 0 ]; then
            echo "ERROR: .cursor-plugin/plugin.json 中 agents 不能为空"
            exit 1
          fi
          echo ".cursor-plugin/plugin.json 验证通过"

      - name: 校验 Cursor marketplace.json
        run: |
          echo "检查 .cursor-plugin/marketplace.json 必填字段..."
          for field in name owner metadata plugins; do
            if ! jq -e ".$field" .cursor-plugin/marketplace.json > /dev/null 2>&1; then
              echo "ERROR: .cursor-plugin/marketplace.json 缺少字段: $field"
              exit 1
            fi
          done
          echo ".cursor-plugin/marketplace.json 验证通过"

      - name: 校验 manifest 中的 agent 路径存在
        run: |
          echo "检查 Cursor plugin.json 中 agents 路径..."
          root="$(pwd)"
          while IFS= read -r rel; do
            path="$root/${rel#./}"
            if [ ! -f "$path" ]; then
              echo "ERROR: agent 文件不存在: $rel -> $path"
              exit 1
            fi
          done < <(jq -r '.agents[]' .cursor-plugin/plugin.json)
          echo "所有 agent 路径存在"

  check-version-sync:
    name: 检查版本号一致性
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 对比版本号
        run: |
          CLAUDE_PLUGIN_VER=$(jq -r '.version' .claude-plugin/plugin.json)
          CLAUDE_MARKET_VER=$(jq -r '.metadata.version' .claude-plugin/marketplace.json)
          CURSOR_PLUGIN_VER=$(jq -r '.version' .cursor-plugin/plugin.json)
          CURSOR_MARKET_VER=$(jq -r '.metadata.version' .cursor-plugin/marketplace.json)

          echo "Claude plugin.json 版本: $CLAUDE_PLUGIN_VER"
          echo "Claude marketplace.json 版本: $CLAUDE_MARKET_VER"
          echo "Cursor plugin.json 版本: $CURSOR_PLUGIN_VER"
          echo "Cursor marketplace.json 版本: $CURSOR_MARKET_VER"

          if [ "$CLAUDE_PLUGIN_VER" != "$CLAUDE_MARKET_VER" ]; then
            echo "ERROR: Claude 版本不一致！plugin.json=$CLAUDE_PLUGIN_VER, marketplace.json=$CLAUDE_MARKET_VER"
            exit 1
          fi

          if [ "$CURSOR_PLUGIN_VER" != "$CURSOR_MARKET_VER" ]; then
            echo "ERROR: Cursor 版本不一致！plugin.json=$CURSOR_PLUGIN_VER, marketplace.json=$CURSOR_MARKET_VER"
            exit 1
          fi

          if [ "$CLAUDE_PLUGIN_VER" != "$CURSOR_PLUGIN_VER" ]; then
            echo "ERROR: Claude 与 Cursor plugin.json 版本不一致！claude=$CLAUDE_PLUGIN_VER, cursor=$CURSOR_PLUGIN_VER"
            exit 1
          fi

          echo "版本号一致: $CLAUDE_PLUGIN_VER"
